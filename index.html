<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Webcam 控制 VRM 模型系統</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        #canvas3d { width: 100vw; height: 100vh; display: block; }
        #webcam { display: none; }
        #preview-container {
            position: absolute; left: 20px; bottom: 20px;
            width: 200px; height: 150px; background: #000;
            border: 2px solid #fff; border-radius: 8px; overflow: hidden;
            transform: scaleX(-1);
        }
        #output_canvas { width: 100%; height: 100%; }
        #info {
            position: absolute; top: 20px; left: 20px;
            color: #fff; background: rgba(0,0,0,0.8);
            padding: 15px; border-radius: 8px; pointer-events: none;
            max-width: 400px; line-height: 1.5;
        }
    </style>

    <!-- 修正：引入相容性最好的 Three.js 舊版與配套載入器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@0.6.7/lib/three-vrm.js"></script>

    <!-- MediaPipe 動作偵測 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="info">
        <h2>Webcam ➔ VRM 驅動測試</h2>
        <p>系統狀態：<span id="status" style="color: #ffc107;">正在初始化環境...</span></p>
        <p>💡 提示：載入完成後請點擊允許相機權限，並向攝影機展示你的**右手**上下擺動！</p>
    </div>

    <canvas id="canvas3d"></canvas>

    <div id="preview-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="200" height="150"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let currentVrm = null;

        // 1. 初始化 3D 場景
        const canvas3d = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        const camera3d = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera3d.position.set(0.0, 1.4, 1.4);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;

        const controls = new THREE.OrbitControls(camera3d, renderer.domElement);
        controls.target.set(0.0, 1.3, 0.0);
        controls.update();

        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const clock = new THREE.Clock();

        // 2. 載入穩定的官方測試 VRM 模型
        statusEl.innerText = "正在遠端下載 3D 模型 (約需 5-10 秒)...";
        const loader = new THREE.GLTFLoader();
        
        // 替換為更穩定的 Pixiv 官方模型網址
        const vrmUrl = 'https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/three-vrm-girl.vrm';

        loader.load(
            vrmUrl,
            (gltf) => {
                // 呼叫 vrm 0.6.7 版本的載入方式
                THREE.VRM.from(gltf).then((vrm) => {
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    vrm.scene.rotation.y = Math.PI; // 面向鏡頭
                    statusEl.innerText = "模型載入成功！正在向瀏覽器請求相機權限...";
                    startCamera();
                });
            },
            (progress) => {
                if (progress.total) {
                    const percent = Math.round((progress.loaded / progress.total) * 100);
                    statusEl.innerText = `模型下載中: ${percent}%`;
                }
            },
            (error) => {
                statusEl.innerText = "模型載入失敗，可能因跨網域阻擋，請嘗試重新整理。";
                console.error(error);
            }
        );

        // 3. 動作捕捉連動
        function onPoseResults(results) {
            const canvas2d = document.getElementById('output_canvas');
            const ctx2d = canvas2d.getContext('2d');
            ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
            ctx2d.drawImage(results.image, 0, 0, canvas2d.width, canvas2d.height);

            if (results.poseLandmarks && currentVrm) {
                const rightWrist = results.poseLandmarks[16];
                const rightShoulder = results.poseLandmarks[12];

                if (rightWrist && rightShoulder && rightWrist.visibility > 0.5) {
                    const deltaY = rightShoulder.y - rightWrist.y; 
                    
                    // VRM 0.6.x 取得骨架節點的方法
                    const rightUpperArm = currentVrm.humanoid.getBoneNode(THREE.VRMHumanoidBoneName.RightUpperArm);
                    
                    if (rightUpperArm) {
                        let targetRotationZ = deltaY * 2.5;
                        targetRotationZ = Math.max(-0.2, Math.min(1.5, targetRotationZ));
                        rightUpperArm.rotation.z += (targetRotationZ - rightUpperArm.rotation.z) * 0.3;
                    }
                }
            }
        }

        // 4. 啟動相機
        function startCamera() {
            const videoElement = document.getElementById('webcam');
            
            const pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onPoseResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            
            camera.start()
                .then(() => { 
                    statusEl.style.color = "#28a745";
                    statusEl.innerText = "系統運作中！請揮動右手。"; 
                })
                .catch(err => { 
                    statusEl.style.color = "#dc3545";
                    statusEl.innerText = "相機開啟失敗。請檢查瀏覽器網址左側鎖頭，確認已允許相機權限。"; 
                });
        }

        // 5. 渲染循環
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(deltaTime);
            }
            renderer.render(scene, camera3d);
        }
        animate();

        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
