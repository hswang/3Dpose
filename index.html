<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam ➔ VRM 驅動測試</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            max-width: 500px;
            pointer-events: none;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 15px 0;
        }
        .status-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .error {
            color: #ffcc00;
        }
        .success {
            color: #00ff88;
        }
        .hint {
            font-size: 15px;
            color: #ddd;
            line-height: 1.4;
        }
        .interactive {
            pointer-events: auto;
            margin-top: 15px;
        }
        #vrm-upload {
            display: none;
        }
        .upload-btn {
            display: inline-block;
            background: #0076ff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .upload-btn:hover {
            background: #005ecf;
        }
        /* 攝影機預覽畫面（左下角） */
        #webcam-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1); /* 鏡像畫面方便使用者對照 */
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* 3D 渲染畫布 */
        #canvas3d {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>

    <!-- 匯入 Three.js 與必要套件的 CDN (使用 ES Modules 映射) -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
    
    <!-- 匯入 MediaPipe Hands 用于手勢辨識 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Webcam ➔ VRM 驅動測試</h1>
        <div id="status" class="status-text error">
            系統狀態：等待上傳模型。請點擊下方按鈕選擇您的 .vrm 檔案以繞過跨網域阻擋。
        </div>
        <div class="hint">
            💡 提示：載入完成後請允許相機權限，並請退後一點，確保您的**手部**能完整出現在視訊方框內。
        </div>
        <div class="interactive">
            <label for="vrm-upload" class="upload-btn">選擇並上傳 VRM 模型</label>
            <input type="file" id="vrm-upload" accept=".vrm">
        </div>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        let scene, camera, renderer, currentVrm, clock;
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        const fileInput = document.getElementById('vrm-upload');

        // --- 1. 初始化 3D 場景 ---
        function init3D() {
            const canvas = document.getElementById('canvas3d');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            // 調整相機位置，更靠近角色正面上半身
            camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
            camera.position.set(0.0, 1.3, 1.5); 

            const light = new THREE.DirectionalLight(0xffffff, 1.2);
            light.position.set(0.0, 1.0, 1.0).normalize();
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            clock = new THREE.Clock();
            animate();
        }

        // --- 2. 處理使用者本地上傳 VRM ---
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusElement.className = "status-text";
            statusElement.innerText = "系統狀態：正在讀取並解析模型中...";

            if (currentVrm) {
                scene.remove(currentVrm.scene);
                currentVrm.scene.traverse((object) => {
                    if (object.geometry) object.geometry.dispose();
                    if (object.material) {
                        if (Array.isArray(object.material)) {
                            object.material.forEach((material) => material.dispose());
                        } else {
                            object.material.dispose();
                        }
                    }
                });
                currentVrm = null;
            }

            const blobUrl = URL.createObjectURL(file);

            loader.load(
                blobUrl,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    currentVrm = vrm;
                    scene.add(vrm.scene);

                    // 關鍵修正：將角度設為 0，讓模型正面朝向螢幕前方的使用者
                    vrm.scene.rotation.y = 0; 

                    statusElement.className = "status-text success";
                    statusElement.innerText = "系統狀態：模型載入成功！正在啟動視訊鏡頭偵測...";
                    
                    URL.revokeObjectURL(blobUrl);
                    
                    // 啟動視訊與追蹤
                    initWebcamAndTracking();
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        statusElement.innerText = `系統狀態：正在載入模型 (${percent}%)`;
                    }
                },
                (error) => {
                    console.error(error);
                    statusElement.className = "status-text error";
                    statusElement.innerText = "系統狀態：模型解析失敗，請確認檔案是否為標準 VRM 格式。";
                    URL.revokeObjectURL(blobUrl);
                }
            );
        });

        // --- 3. 初始化視訊與 MediaPipe 手勢偵測 ---
        function initWebcamAndTracking() {
            // 避免重複初始化
            if (window.trackerInitialized) return;
            window.trackerInitialized = true;

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            cameraUtils.start()
                .then(() => {
                    statusElement.className = "status-text success";
                    statusElement.innerText = "系統狀態：動態驅動中。請揮舞雙手測試模型動作！";
                })
                .catch((err) => {
                    console.error(err);
                    statusElement.className = "status-text error";
                    statusElement.innerText = "系統狀態：無法存取視訊鏡頭，請確認瀏覽器權限是否開啟。";
                });
        }

        // --- 4. 核心修正：手勢結果連動骨骼 ---
        function onHandResults(results) {
            if (!currentVrm || !results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                return;
            }

            // 取得畫面上偵測到的第一隻手（不分左右手，只要抓到就驅動）
            const landmarks = results.multiHandLandmarks[0];
            
            // 取得手腕（WRIST，節點 0）的 Y 軸位置 (MediaPipe 頂部為 0，底部為 1)
            const wristY = landmarks[0].y; 

            // 將 Y 軸數值轉換為手臂上下旋轉的角度 (弧度制)
            // 當手舉高 (wristY 接近 0) 時，算出的角度會變大；手放下時變小
            const targetRotationZ = (0.5 - wristY) * 2.5; 

            // 同步驅動右手臂與左手臂骨骼
            const rightUpperArm = currentVrm.humanoid.getRawBoneNode('rightUpperArm');
            if (rightUpperArm) {
                // 平滑插值 (Lerp)，數值 0.25 可使擺動看起來較為柔和順暢
                rightUpperArm.rotation.z = THREE.MathUtils.lerp(rightUpperArm.rotation.z, targetRotationZ, 0.25);
            }
            
            const leftUpperArm = currentVrm.humanoid.getRawBoneNode('leftUpperArm');
            if (leftUpperArm) {
                // 左臂旋轉方向與右臂相反，故加上負號
                leftUpperArm.rotation.z = THREE.MathUtils.lerp(leftUpperArm.rotation.z, -targetRotationZ, 0.25);
            }
        }

        // --- 5. 動畫渲染迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
            }

            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>
</html>
