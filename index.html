<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Webcam 控制 VRM 模型系統</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }
        /* 畫布充滿全螢幕 */
        #canvas3d { width: 100vw; height: 100vh; display: block; }
        /* 隱藏原始視訊，只留小視窗在左下角參考 */
        #webcam { display: none; }
        #preview-container {
            position: absolute; left: 20px; bottom: 20px;
            width: 200px; height: 150px; background: #000;
            border: 2px solid #fff; border-radius: 8px; overflow: hidden;
            transform: scaleX(-1); /* 鏡像 */
        }
        #output_canvas { width: 100%; height: 100%; }
        #info {
            position: absolute; top: 20px; left: 20px;
            color: #fff; background: rgba(0,0,0,0.7);
            padding: 15px; border-radius: 8px; pointer-events: none;
        }
    </style>

    <!-- 1. 引入 Three.js 與 VRM 載入器 -->
    <script src="https://unpkg.com/three@0.154.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.154.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/@pixiv/three-vrm@2.0.2/lib/three-vrm.js"></script>

    <!-- 2. 引入 MediaPipe 動作偵測 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="info">
        <h2>Webcam ➔ VRM 驅動測試</h2>
        <p>系統狀態：<span id="status">載入中...</span></p>
        <p>💡 提示：請向攝影機展示你的**右手**並上下擺動，模型的手臂會隨之轉動！</p>
    </div>

    <!-- 3D 渲染畫布 -->
    <canvas id="canvas3d"></canvas>

    <!-- 左下角視訊預覽 -->
    <div id="preview-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="200" height="150"></canvas>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        let currentVrm = null;

        // --- 1. 初始化 Three.js 3D 場景 ---
        const canvas3d = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        
        // 攝影機
        const camera3d = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
        camera3d.position.set(0.0, 1.4, 1.4); // 聚焦在模型的上半身

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputEncoding = THREE.sRGBEncoding;

        // 滑鼠控制視角
        const controls = new THREE.OrbitControls(camera3d, renderer.domElement);
        controls.target.set(0.0, 1.3, 0.0);
        controls.update();

        // 光源
        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1.0, 1.0, 1.0).normalize();
        scene.add(light);
        const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambLight);

        // 時鐘（動態更新 VRM 需要）
        const clock = new THREE.Clock();

        // --- 2. 載入官方開源測試 VRM 模型 ---
        statusEl.innerText = "正在載入 3D VRM 模型...";
        const loader = new THREE.GLTFLoader();
        
        // 使用 Pixiv 官方提供的測試 3D 虛擬人物模型 (Avatar)
        const vrmUrl = 'https://pixiv.github.io/three-vrm/packages/three-vrm/examples/models/three-vrm-girl.vrm';

        loader.load(
            vrmUrl,
            (gltf) => {
                // 將 GLTF 轉換為 VRM 格式
                THREE.VRMUtils.removeUnusedVerticesAndFaces(gltf.scene);
                THREE.VRMUtils.combineJoints(gltf.scene);

                THREE.VRM.from(gltf).then((vrm) => {
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    // 讓模型轉身面向鏡頭
                    vrm.scene.rotation.y = Math.PI; 
                    statusEl.innerText = "模型載入成功，正在啟動相機...";
                    startCamera();
                });
            },
            (progress) => console.log('Loading...', (progress.loaded / progress.total * 100) + '%'),
            (error) => {
                statusEl.innerText = "模型載入失敗，請檢查網路。";
                console.error(error);
            }
        );

        // --- 3. 動作捕捉與模型骨架連動邏輯 ---
        function onPoseResults(results) {
            // 繪製左下角的 2D 預覽畫面
            const canvas2d = document.getElementById('output_canvas');
            const ctx2d = canvas2d.getContext('2d');
            ctx2d.clearRect(0, 0, canvas2d.width, canvas2d.height);
            ctx2d.drawImage(results.image, 0, 0, canvas2d.width, canvas2d.height);

            // 如果有偵測到骨架，且 3D 模型已準備就緒
            if (results.poseLandmarks && currentVrm) {
                // 取得右手腕 (16) 和 右肩膀 (12) 的座標
                const rightWrist = results.poseLandmarks[16];
                const rightShoulder = results.poseLandmarks[12];

                if (rightWrist && rightShoulder && rightWrist.visibility > 0.5) {
                    // 計算手腕相對於肩膀的 Y 軸差距，用來控制手臂抬高或放低
                    const deltaY = rightShoulder.y - rightWrist.y; 
                    
                    // 取得模型的右肩骨架 (RightShoulder 或 RightUpperArm)
                    const rightUpperArm = currentVrm.humanoid.getBoneNode(THREE.VRMHumanoidBoneName.RightUpperArm);
                    
                    if (rightUpperArm) {
                        // 根據動作幅度，動態改變 3D 骨架的 Z 軸旋轉角度（這裡使用簡單的映射）
                        let targetRotationZ = deltaY * 3.0;
                        // 限制旋轉角度，避免模型關節折斷（極端變形）
                        targetRotationZ = Math.max(-0.5, Math.min(1.5, targetRotationZ));
                        
                        // 平滑過渡 (Lerp)
                        rightUpperArm.rotation.z += (targetRotationZ - rightUpperArm.rotation.z) * 0.2;
                    }
                }
            }
        }

        // --- 4. 啟動相機與 MediaPipe ---
        function startCamera() {
            const videoElement = document.getElementById('webcam');
            
            const pose = new Pose({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            pose.onResults(onPoseResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });
            
            camera.start()
                .then(() => { statusEl.innerText = "系統運作中！請對鏡頭揮動右手。"; })
                .catch(err => { statusEl.innerText = "無法開啟相機，請檢查權限。"; });
        }

        // --- 5. 遊戲/渲染循環 (Render Loop) ---
        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();
            if (currentVrm) {
                // 更新 VRM 模型的物理動態（例如頭髮、衣服的飄動效果）
                currentVrm.update(deltaTime);
            }

            renderer.render(scene, camera3d);
        }
        animate();

        // 視窗大小改變時，自動調整 3D 畫面比例
        window.addEventListener('resize', () => {
            camera3d.aspect = window.innerWidth / window.innerHeight;
            camera3d.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
