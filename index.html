<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam ➔ VRM 驅動測試</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            max-width: 500px;
            pointer-events: none;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 15px 0;
        }
        .status-text {
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .error {
            color: #ffcc00;
        }
        .success {
            color: #00ff88;
        }
        .hint {
            font-size: 15px;
            color: #ddd;
            line-height: 1.4;
        }
        .interactive {
            pointer-events: auto;
            margin-top: 15px;
        }
        #vrm-upload {
            display: none;
        }
        .upload-btn {
            display: inline-block;
            background: #0076ff;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .upload-btn:hover {
            background: #005ecf;
        }
        #webcam-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 240px;
            height: 180px;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
            z-index: 10;
            transform: scaleX(-1); 
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #canvas3d {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Webcam ➔ VRM 驅動測試</h1>
        <div id="status" class="status-text error">
            系統狀態：等待上傳模型。請點擊下方按鈕選擇您的 .vrm 檔案。
        </div>
        <div class="hint">
            💡 提示：載入完成後請舉起手在視訊畫面內上下擺動，觀察模型手臂是否連動。
        </div>
        <div class="interactive">
            <label for="vrm-upload" class="upload-btn">選擇並上傳 VRM 模型</label>
            <input type="file" id="vrm-upload" accept=".vrm">
        </div>
    </div>

    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <canvas id="canvas3d"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin } from '@pixiv/three-vrm';

        let scene, camera, renderer, currentVrm, clock;
        const videoElement = document.getElementById('webcam');
        const statusElement = document.getElementById('status');
        const fileInput = document.getElementById('vrm-upload');

        function init3D() {
            const canvas = document.getElementById('canvas3d');
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputColorSpace = THREE.SRGBColorSpace;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20.0);
            camera.position.set(0.0, 1.3, 1.6); 

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(0.0, 1.0, 1.0).normalize();
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            clock = new THREE.Clock();
            animate();
        }

        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            statusElement.className = "status-text";
            statusElement.innerText = "系統狀態：正在讀取並解析模型中...";

            if (currentVrm) {
                scene.remove(currentVrm.scene);
                currentVrm = null;
            }

            const blobUrl = URL.createObjectURL(file);

            loader.load(
                blobUrl,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    currentVrm = vrm;
                    scene.add(vrm.scene);

                    // 強制轉向 180 度（Math.PI），確保正面向著螢幕
                    vrm.scene.rotation.y = Math.PI; 

                    statusElement.className = "status-text success";
                    statusElement.innerText = "系統狀態：模型載入成功！正在啟動視訊鏡頭偵測...";
                    
                    URL.revokeObjectURL(blobUrl);
                    initWebcamAndTracking();
                },
                (progress) => {
                    if (progress.total > 0) {
                        const percent = Math.round((progress.loaded / progress.total) * 100);
                        statusElement.innerText = `系統狀態：正在載入模型 (${percent}%)`;
                    }
                },
                (error) => {
                    console.error(error);
                    statusElement.className = "status-text error";
                    statusElement.innerText = "系統狀態：模型解析失敗。";
                    URL.revokeObjectURL(blobUrl);
                }
            );
        });

        function initWebcamAndTracking() {
            if (window.trackerInitialized) return;
            window.trackerInitialized = true;

            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            cameraUtils.start()
                .then(() => {
                    statusElement.className = "status-text success";
                    statusElement.innerText = "系統狀態：動態驅動中。請揮舞雙手測試模型動作！";
                })
                .catch((err) => {
                    console.error(err);
                    statusElement.className = "status-text error";
                    statusElement.innerText = "系統狀態：視訊鏡頭啟動失敗。";
                });
        }

        // --- 萬用相容手勢連動處理 ---
        function onHandResults(results) {
            if (!currentVrm || !results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            const wristY = landmarks[0].y; 

            // 計算出更靈敏的角度變化
            const targetRotationZ = (0.5 - wristY) * 3.0; 

            // 同時兼容新舊版 VRM 骨骼結構的抓取方式
            const humanoid = currentVrm.humanoid;
            
            // 抓取右手臂（相容寫法）
            const rightArm = humanoid.getRawBoneNode('rightUpperArm') || 
                             (humanoid.getBoneNode && humanoid.getBoneNode('rightUpperArm')) ||
                             (currentVrm.vrm1 ? currentVrm.humanoid.getNormalizedBoneNode('rightUpperArm') : null);

            if (rightArm) {
                // 當模型轉正 180 度後，右手 z 軸正負號需做對應調整
                rightArm.rotation.z = THREE.MathUtils.lerp(rightArm.rotation.z, -targetRotationZ, 0.25);
            }
            
            // 抓取左手臂（相容寫法）
            const leftArm = humanoid.getRawBoneNode('leftUpperArm') || 
                            (humanoid.getBoneNode && humanoid.getBoneNode('leftUpperArm')) ||
                            (currentVrm.vrm1 ? currentVrm.humanoid.getNormalizedBoneNode('leftUpperArm') : null);

            if (leftArm) {
                leftArm.rotation.z = THREE.MathUtils.lerp(leftArm.rotation.z, targetRotationZ, 0.25);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(delta);
            }
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('DOMContentLoaded', init3D);
    </script>
</body>
</html>
